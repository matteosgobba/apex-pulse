model:
  min_events: 5
  random_state: 42
  ridge_alpha: 1.0
  random_forest:
    n_estimators: 200
    max_depth: 8
    min_samples_leaf: 2
  models:
    hist_gradient_boosting:
      enabled: true
      max_iter: 200
      learning_rate: 0.05
      max_leaf_nodes: 31
      l2_regularization: 0.1
      random_state: 42
  feature_group_policy:
    after_fp1: base_lap_features
    after_fp2: base_plus_quality
    after_fp3: base_plus_relative
  champion_policy:
    selection_metric: mae_gap_sec
    stabilized_nested:
      min_prior_folds: 5
      min_prior_predictions: 100
      selection_metric: mae_gap_sec
      improvement_margin_sec: 0.05
    stabilized_nested_guarded:
      base_mode: stabilized_nested
      fp3_no_baseline_switch: true
      guarded_checkpoint: after_fp3
      guarded_default_family: ablation
      guarded_default_model_name: random_forest
      guarded_default_feature_group: base_plus_relative
    static:
      after_fp1:
        family: robust_baseline
        model_name: robust_best_push_lap
      after_fp2:
        family: robust_baseline
        model_name: robust_theoretical_best_lap
      after_fp3:
        family: ablation
        model_name: random_forest
        feature_group: base_plus_relative
  uncertainty:
    interval_z: 1.64
    confidence_level: 0.90
    min_residual_count: 20
    predicted_gap_bucket:
      confidence_level: 0.90
      min_residual_count: 20
      bucket_thresholds_sec:
        pole_contender: 0.5
        close_midfield: 1.5
        midfield: 3.0
      fallback_order:
        - checkpoint_method_bucket
        - checkpoint_bucket
        - checkpoint_method
        - checkpoint
        - global
  champion_diagnostics:
    harmful_switch_tolerance_sec: 0.05
  policy_simulation:
    conformal:
      confidence_level: 0.90
      min_residual_count: 20
      fallback_order:
        - checkpoint_method_bucket
        - checkpoint_bucket
        - checkpoint_method
        - checkpoint
        - global
