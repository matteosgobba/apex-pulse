push_lap:
  driver_best_pct_threshold: 1.03
  session_best_pct_threshold: 1.07
  allowed_compounds:
    - SOFT
    - MEDIUM
    - HARD
    - INTERMEDIATE
    - WET

diagnostics:
  extreme_mae_gap_threshold_sec: 1.5
  top_n: 10

historical_features:
  rolling_windows: [3, 5]
  min_periods: 1

data_quality:
  extreme_gap_to_session_best_sec: 3.0
  min_push_laps_latest_session: 2
  min_valid_laps_latest_session: 5

baselines:
  robust_extreme_gap_to_session_best_sec: 3.0
